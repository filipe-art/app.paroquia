<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intenções - Paróquia Mirabela</title>
    <style>
        :root { --primary: #1a2a6c; --gold: #d4af37; --success: #25d366; }
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .card { background: white; border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .santa-img { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 3px solid var(--gold); margin-bottom: 15px; }
        h2 { color: var(--primary); margin: 0; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 12px; box-sizing: border-box; }
        .btn-enviar { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 17px; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://a12-v2.s3.amazonaws.com/size/800/600/624c96576856a319089772.jpg" class="santa-img">
    <h2>Intenções de Missa</h2>
    <p style="font-size: 13px; color: #666;">Os dados serão salvos e enviados via WhatsApp</p>

    <div class="form-group">
        <label>Nome Completo</label>
        <input type="text" id="nome">
    </div>
    <div class="form-group">
        <label>Data da Missa</label>
        <input type="date" id="data">
    </div>
    <div class="form-group">
        <label>Tipo</label>
        <select id="tipo">
            <option value="Ação de Graças">Ação de Graças</option>
            <option value="Saúde">Saúde</option>
            <option value="Falecimento">Falecimento</option>
        </select>
    </div>
    <div class="form-group">
        <label>Intenção</label>
        <textarea id="msg"></textarea>
    </div>

    <button class="btn-enviar" onclick="enviarTudo()">Salvar e Enviar</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    // Sua configuração que você pegou
    const firebaseConfig = {
        apiKey: "AIzaSyDynzHC4K9rW_iINctRitOcQnRggQq15t8",
        authDomain: "paroquia-dados.firebaseapp.com",
        projectId: "paroquia-dados",
        databaseURL: "https://paroquia-dados-default-rtdb.firebaseio.com", // Adicionei o link padrão do banco
        storageBucket: "paroquia-dados.firebasestorage.app",
        messagingSenderId: "922424205454",
        appId: "1:922424205454:web:25aba7f2b73ec7cbde29df"
    };

    // Inicializa o Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function enviarTudo() {
        const nome = document.getElementById('nome').value;
        const data = document.getElementById('data').value;
        const tipo = document.getElementById('tipo').value;
        const msg = document.getElementById('msg').value;

        if(!nome || !data || !msg) {
            alert("Preencha tudo, futuro Dev!");
            return;
        }

        // 1. SALVAR NO FIREBASE
        const novaIntencao = database.ref('intencoes').push();
        novaIntencao.set({
            nome: nome,
            data: data,
            tipo: tipo,
            mensagem: msg,
            horaRegistro: new Date().toLocaleString()
        }, (error) => {
            if (error) {
                alert("Erro ao salvar no banco!");
            } else {
                // 2. SE SALVOU, ABRE O WHATSAPP
                const dataBr = data.split('-').reverse().join('/');
                const texto = `*NOVA INTENÇÃO SALVA*\n\n*Nome:* ${nome}\n*Data:* ${dataBr}\n*Tipo:* ${tipo}\n*Mensagem:* ${msg}`;
                const zapUrl = `https://api.whatsapp.com/send?phone=5533991594560&text=${encodeURIComponent(texto)}`;
                
                window.open(zapUrl, '_blank');
            }
        });
    }
</script>

</body>
</html>
