<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Paróquia</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a2a6c; border-bottom: 2px solid #d4af37; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #333; }
        .btn-delete { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .saude { background: #e3f2fd; color: #1976d2; }
        .falecimento { background: #f5f5f5; color: #616161; }
        .gracas { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Painel de Intenções Recebidas</h2>
    <table id="tabelaIntencoes">
        <thead>
            <tr>
                <th>Data Missa</th>
                <th>Fiel</th>
                <th>Tipo</th>
                <th>Intenção/Nomes</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="corpoTabela">
            </tbody>
    </table>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDynzHC4K9rW_iINctRitOcQnRggQq15t8",
        authDomain: "paroquia-dados.firebaseapp.com",
        projectId: "paroquia-dados",
        databaseURL: "https://paroquia-dados-default-rtdb.firebaseio.com",
        storageBucket: "paroquia-dados.firebasestorage.app",
        messagingSenderId: "922424205454",
        appId: "1:922424205454:web:25aba7f2b73ec7cbde29df"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Referência para a pasta de intenções
    const intencoesRef = database.ref('intencoes');

    // Função para ler os dados em tempo real
    intencoesRef.on('value', (snapshot) => {
        const corpoTabela = document.getElementById('corpoTabela');
        corpoTabela.innerHTML = ""; // Limpa a tabela antes de atualizar

        snapshot.forEach((childSnapshot) => {
            const id = childSnapshot.key;
            const dados = childSnapshot.val();

            const row = `
                <tr>
                    <td>${dados.data}</td>
                    <td><b>${dados.nome}</b></td>
                    <td><span class="badge">${dados.tipo}</span></td>
                    <td>${dados.mensagem}</td>
                    <td>
                        <button class="btn-delete" onclick="remover('${id}')">Excluir</button>
                    </td>
                </tr>
            `;
            corpoTabela.innerHTML += row;
        });
    });

    // Função para remover intenção
    function remover(id) {
        if(confirm("Deseja marcar como concluída e excluir?")) {
            database.ref('intencoes/' + id).remove();
        }
    }
</script>

</body>
</html>
